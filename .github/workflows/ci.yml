name: verification

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: npm ci
      - run: npm test
      - name: Agent-policy tests
        working-directory: pipeline
        run: python -m unittest discover -s tests -v
      - name: SQL and artifact inventory
        run: test -f warehouse/schema.sql && test -f powerbi/measures.dax && test -f artifacts/PoolSignal_Campaign_Review_Pack.xlsx
